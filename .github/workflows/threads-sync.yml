name: note to Threads sync

on:
  schedule:
    - cron: "10 * * * *"   # 毎時 :10（JSTでも毎時。新着noteを1時間以内にThreadsへ）
  workflow_dispatch: {}     # 手動実行も可（テスト用）

permissions:
  contents: write

concurrency:
  group: threads-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run note->Threads sync
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: python scripts/threads_sync.py

      - name: Commit sync state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/threads-synced.json || true
          if git diff --cached --quiet; then
            echo "状態に変更なし。"
            exit 0
          fi
          git commit -m "chore: update threads sync state"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push retry $i"; sleep 5
          done
          echo "push に失敗しました"; exit 1
